<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KnowMesh</title>
</head>
<body>
<h1>KnowMesh — Student RAG Assistant</h1>

<h2>Upload Materials</h2>
<form action="/upload" method="post" enctype="multipart/form-data">
  <label>
    File (.txt, .pdf):
    <input type="file" name="file" required>
  </label>
  <label>
    Strategy:
    <select name="strategy">
      <option value="recursive">Recursive</option>
      <option value="semantic">Semantic</option>
    </select>
  </label>
  <button type="submit">Upload</button>
</form>

<h2>Ask a Question</h2>
<form action="/query" method="post">
  <label>
    Question:
    <input type="text" name="query" size="60" required>
  </label>
  <label>
    LLM Provider:
    <select name="provider">
      <option value="openai">OpenAI (gpt-4o)</option>
      <option value="deepseek">DeepSeek (deepseek-v4-pro)</option>
      <option value="none">Stub (no LLM)</option>
    </select>
  </label>
  <button type="submit">Ask</button>
</form>

<h2>Database</h2>
<button onclick="clearDB()">Clear Database</button>

{% if answer %}
<h2>Answer</h2>
<div>{{ answer }}</div>
{% endif %}

<script>
async function clearDB() {
  const res = await fetch("/collection-info");
  const info = await res.json();
  if (!confirm(`Clear collection '${info.name}'? It contains ${info.count} document(s).`)) return;
  await fetch("/clear", { method: "POST" });
  location.reload();
}
</script>
</body>
</html>
